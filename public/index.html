<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tạo Link Shopee</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2c2c2c, #111);
      display: flex;
      justify-content: center;
      padding: 40px;
      color: #333;
    }

    .container {
      width: 400px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .top {
      background: linear-gradient(135deg, #ff7a45, #ff4d4f);
      color: #fff;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      background: #f1f1f1;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      background: #fff;
      color: #ff4d4f;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn {
      background: #ff4d4f;
      color: white;
    }

    h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- TẠO LINK -->
  <div class="card top">
    <h2>🔗 Tạo Link Shopee</h2>
    <p>Nhập link sản phẩm để nhận hoàn tiền</p>

    <input id="linkInput" placeholder="Dán link Shopee vào đây...">
    <button onclick="createLink()">➕ Tạo Link</button>
  </div>

  <!-- FORM HOÀN TIỀN -->
  <div class="card">
    <h3>💰 Nhận hoàn tiền</h3>
    <p>Điền thông tin sau khi mua để được hoàn tiền</p>

    <input id="name" placeholder="Tên của bạn">
    <input id="order" placeholder="Mã đơn hàng Shopee">
    <input id="bank" placeholder="Số tài khoản / Momo">
    <input id="product" placeholder="Link sản phẩm đã mua">

    <button class="submit-btn" onclick="submitForm()">Gửi yêu cầu</button>
  </div>

</div>

<script>
function createLink() {
  let link = document.getElementById("linkInput").value;

  if (!link) {
    alert("Nhập link đi bạn!");
    return;
  }

  window.location.href = "https://s.shopee.vn/AUpb4ZviyZ";
}

function submitForm() {
  let name = document.getElementById("name").value;
  let order = document.getElementById("order").value;
  let bank = document.getElementById("bank").value;
  let product = document.getElementById("product").value;

  if (!name || !order || !bank || !product) {
    alert("Điền đầy đủ thông tin nha!");
    return;
  }

  alert("Đã gửi! Mình sẽ kiểm tra và hoàn tiền cho bạn.");

  // reset form
  document.getElementById("name").value = "";
  document.getElementById("order").value = "";
  document.getElementById("bank").value = "";
  document.getElementById("product").value = "";
}
</script>

</body>
</html>
